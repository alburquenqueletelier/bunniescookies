<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Stylized representation: stack of cookies with x10 label -->
  <rect x="30" y="140" width="140" height="30" rx="15" fill="#F5E6D0" stroke="#C4956A" stroke-width="1.5"/>
  <rect x="35" y="120" width="130" height="30" rx="15" fill="#F5E6D0" stroke="#C4956A" stroke-width="1.5"/>
  <rect x="40" y="100" width="120" height="30" rx="15" fill="#F5E6D0" stroke="#C4956A" stroke-width="1.5"/>

  <!-- Top cookie face -->
  <g transform="translate(55,15) scale(0.5)">
    <ellipse cx="30" cy="18" rx="12" ry="22" fill="#F5E6D0" stroke="#C4956A" stroke-width="2"/>
    <ellipse cx="70" cy="18" rx="12" ry="22" fill="#F5E6D0" stroke="#C4956A" stroke-width="2"/>
    <ellipse cx="30" cy="18" rx="7" ry="16" fill="#FFB3C8" opacity="0.7"/>
    <ellipse cx="70" cy="18" rx="7" ry="16" fill="#FFB3C8" opacity="0.7"/>
    <circle cx="50" cy="75" r="48" fill="#F5E6D0" stroke="#C4956A" stroke-width="2"/>
    <circle cx="37" cy="68" r="3.5" fill="#5C3317"/>
    <circle cx="63" cy="68" r="3.5" fill="#5C3317"/>
    <ellipse cx="50" cy="78" rx="4" ry="2.5" fill="#FFB3C8"/>
    <path d="M43 84 Q50 90 57 84" stroke="#5C3317" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="34" cy="78" r="7" fill="#FF9EB5" opacity="0.4"/>
    <circle cx="66" cy="78" r="7" fill="#FF9EB5" opacity="0.4"/>
  </g>

  <!-- x10 badge -->
  <circle cx="155" cy="30" r="22" fill="#7C3527"/>
  <text x="155" y="26" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">x10</text>
  <text x="155" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFB3C8">🌟</text>

  <rect x="55" y="175" width="90" height="22" rx="11" fill="#F9A8D4"/>
  <text x="100" y="191" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7C3527">10 Bunnies</text>
</svg>
